<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Network Console</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
}

/* Centered layout for desktop */
.container {
    width: 900px;
    margin: auto;
    padding-top: 20px;
    text-align: center;
}

input, button {
    margin: 5px;
    padding: 10px;
    background: black;
    color: #00ff00;
    border: 1px solid #00ff00;
    width: 250px;
}

#console {
    margin-top: 20px;
    height: 300px;
    border: 1px solid #00ff00;
    padding: 10px;
    overflow-y: auto;
    text-align: left;
}

#progressBar {
    width: 100%;
    height: 10px;
    border: 1px solid #00ff00;
    margin-top: 10px;
}

#progress {
    height: 100%;
    width: 0%;
    background: #00ff00;
}

#report {
    display: none;
    border: 1px solid #00ff00;
    padding: 10px;
    margin-top: 15px;
}

.redMode {
    background: #200000;
    color: red;
}

.fullscreenBtn {
    position: fixed;
    top: 10px;
    right: 10px;
}
</style>
</head>

<body>

<button class="fullscreenBtn" onclick="goFull()">⛶ Fullscreen</button>

<div class="container">

<h2>⚡ ELITE NETWORK TERMINAL</h2>

<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="phone" placeholder="Phone"><br>
<input id="ip" placeholder="IP Address"><br>

<button onclick="startScan()">RUN SCAN</button>

<div id="console"></div>

<div id="progressBar"><div id="progress"></div></div>
<h3 id="timer"></h3>

<button onclick="downloadReport()" id="downloadBtn" style="display:none;">Download Report</button>

<div id="report"></div>

</div>

<audio id="hackSound" src="https://www.fesliyanstudios.com/play-mp3/6677"></audio>

<script>
let consoleBox = document.getElementById("console");
let progress = document.getElementById("progress");
let timerText = document.getElementById("timer");

function speak(text){
    let speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1;
    speech.pitch = 0.7;
    speech.volume = 1;
    speechSynthesis.speak(speech);
}

function typeLine(text){
    let i = 0;
    let line = document.createElement("div");
    consoleBox.appendChild(line);

    let interval = setInterval(()=>{
        line.innerHTML += text[i];
        i++;
        if(i >= text.length) clearInterval(interval);
        consoleBox.scrollTop = consoleBox.scrollHeight;
    },20);
}

function goFull(){
    document.documentElement.requestFullscreen();
}

function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }
}

function startScan(){

    goFull();
    vibrate();

    setTimeout(()=>{
        alert("⚠️ Camera Access Requested...");
    },2000);

    document.getElementById("hackSound").play();
    speak("System breach initiated");

    consoleBox.innerHTML = "";
    progress.style.width = "0%";
    document.getElementById("report").style.display = "none";

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let ip = document.getElementById("ip").value;

    let steps = [
        "Initializing system...",
        "Connecting to global nodes...",
        "Tracking IP...",
        "Location: India",
        "Scanning ports...",
        "Injecting packets...",
        "Decrypting...",
        "⚠️ Suspicious activity detected...",
        "Uploading data to secure server...",
        "Upload 25%",
        "Upload 50%",
        "Upload 75%",
        "Upload Complete",
        "Finalizing..."
    ];

    let i = 0;
    let progressVal = 0;

    let logInterval = setInterval(()=>{
        if(i < steps.length){
            typeLine("> " + steps[i]);
            i++;
        }
    },1000);

    let progressInterval = setInterval(()=>{
        progressVal += 1;
        progress.style.width = progressVal + "%";

        let min = Math.floor((100-progressVal)/20);
        let sec = (100-progressVal)%60;
        timerText.innerText = `Scanning... ${min}:${sec}`;

        if(progressVal === 60){
            document.body.classList.add("redMode");
            speak("Warning. Threat detected");
        }

        if(progressVal >= 100){
            clearInterval(progressInterval);
            clearInterval(logInterval);
            speak("Scan complete");
            showReport(name,email,phone,ip);
        }

    },150);
}

function showReport(name,email,phone,ip){
    let report = document.getElementById("report");

    report.innerHTML = `
    <h3>FINAL REPORT</h3>
    Name: ${name}<br>
    Email: ${email}<br>
    Phone: ${phone}<br>
    IP: ${ip}<br><br>

    Active User: -217<br>
    Vito: 119<br>
    Sisu Level: 17%
    `;

    report.style.display = "block";
    document.getElementById("downloadBtn").style.display = "block";
}

function downloadReport(){
    let text = document.getElementById("report").innerText;
    let blob = new Blob([text], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "report.txt";
    a.click();
}
</script>

</body>
</html>
